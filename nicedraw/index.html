<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>抽签屋 Lucky Draw House</title>
<style>
  :root{
    --bg:#fff8ec; --card:#fffdf8; --ink:#4b3b32; --muted:#9b8579;
    --pink:#ff6f9c; --pink2:#ff8db2; --purple:#9b63e8; --mint:#63c7a1;
    --cream:#fff3d6; --line:#f1dfd2; --shadow:0 14px 34px rgba(112,82,55,.12);
    --radius:24px;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:radial-gradient(circle at 20% 0,#fff3fb 0 20%,transparent 34%),linear-gradient(180deg,#fffaf2,#fff4e7);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    color:var(--ink)
  }
  button,input,textarea,select{font:inherit}
  button{cursor:pointer;border:0}
  .app{max-width:430px;margin:0 auto;min-height:100vh;padding:14px 14px 88px;position:relative}
  .top{display:flex;align-items:center;justify-content:space-between;margin:4px 0 12px}
  .avatar{width:38px;height:38px;border-radius:50%;background:#ffe0e9;display:grid;place-items:center;border:2px solid #fff}
  .bell{font-size:22px}
  .hero{
    background:linear-gradient(180deg,#fff8e4,#fffef9);
    border:1px solid var(--line);
    border-radius:28px;
    padding:18px 16px 14px;
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden
  }
  .hero:after{
    content:"🐰  🏠  🐱";
    position:absolute;
    right:16px;
    bottom:16px;
    font-size:42px;
    letter-spacing:3px;
    opacity:.92
  }
  .title{font-size:28px;line-height:1.1;font-weight:900;margin:4px 0 6px}
  .subtitle{color:var(--muted);font-size:13px}
  .primary{
    background:linear-gradient(135deg,var(--pink),#ff4f85);
    color:white;
    border-radius:999px;
    padding:15px 18px;
    font-weight:800;
    box-shadow:0 9px 18px rgba(255,83,132,.25);
    width:100%
  }
  .secondary{
    background:white;
    color:var(--ink);
    border:1px solid var(--line);
    border-radius:999px;
    padding:12px 16px;
    font-weight:700
  }
  .ghost{
    background:#fff7f1;
    color:var(--pink);
    border:1px solid #ffd3df;
    border-radius:999px;
    padding:10px 13px;
    font-weight:750
  }
  .row{display:flex;gap:10px;align-items:center}
  .between{display:flex;justify-content:space-between;align-items:center}
  .section{margin-top:20px}
  .section h3{font-size:16px;margin:0 0 10px}
  .see{color:var(--muted);font-size:12px}
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:0 8px 22px rgba(106,77,47,.08);
    padding:14px;
    margin-bottom:10px
  }
  .activity{display:grid;grid-template-columns:48px 1fr auto;gap:10px;align-items:center}
  .icon{width:44px;height:44px;border-radius:16px;background:#ffeaf1;display:grid;place-items:center;font-size:24px}
  .small{font-size:12px;color:var(--muted)}
  .name{font-weight:850}
  .pill{font-size:11px;padding:5px 9px;border-radius:999px;background:#fff0d7;color:#a36b24;font-weight:700}
  .nav{
    position:fixed;
    left:50%;
    bottom:12px;
    transform:translateX(-50%);
    width:min(430px,calc(100vw - 22px));
    background:rgba(255,253,248,.92);
    backdrop-filter:blur(12px);
    border:1px solid var(--line);
    border-radius:24px;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    padding:8px;
    box-shadow:0 10px 28px rgba(87,61,36,.15);
    z-index:5
  }
  .nav button{background:transparent;border-radius:18px;padding:7px 0;color:#8c7569;font-size:11px}
  .nav button.active{background:#fff1f5;color:var(--pink);font-weight:800}
  .nav b{display:block;font-size:20px;margin-bottom:2px}
  .page{display:none}
  .page.active{display:block}
  .back{font-size:24px;background:transparent}
  .type-card{min-height:118px;display:grid;grid-template-columns:1fr 100px;align-items:center}
  .type-card .emoji{font-size:60px;text-align:center}
  .type-card h3{font-size:20px;margin:0 0 6px}
  .stepper{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin:8px 0 14px;text-align:center}
  .step .dot{
    width:30px;
    height:30px;
    border-radius:50%;
    margin:0 auto 4px;
    background:white;
    border:1px solid var(--line);
    display:grid;
    place-items:center;
    color:#aaa;
    font-size:13px
  }
  .step.on .dot{background:linear-gradient(135deg,var(--purple),#c07cff);color:white;border:0}
  .step.done .dot{background:var(--mint);color:white;border:0}
  .step span{font-size:11px;color:var(--muted)}
  label{display:block;font-weight:800;margin:12px 0 6px}
  input,textarea,select{
    width:100%;
    border:1px solid var(--line);
    background:#fff;
    border-radius:16px;
    padding:13px 14px;
    outline:none;
    color:var(--ink)
  }
  textarea{min-height:110px;resize:vertical}
  .hint{font-size:12px;color:var(--muted);margin-top:5px}
  .tabs{display:flex;background:#fff6ef;border:1px solid var(--line);border-radius:18px;padding:4px;margin-bottom:12px}
  .tabs button{flex:1;border-radius:14px;padding:9px;background:transparent;color:var(--muted);font-weight:800}
  .tabs button.on{background:#fff;color:var(--pink);box-shadow:0 4px 10px rgba(80,55,30,.08)}
  .toggle{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:16px;padding:12px;margin:8px 0;background:#fff}
  .switch{width:48px;height:28px;border-radius:999px;background:#e9d9cd;position:relative}
  .switch.on{background:var(--mint)}
  .switch:after{content:"";position:absolute;top:4px;left:4px;width:20px;height:20px;border-radius:50%;background:white;transition:.2s}
  .switch.on:after{left:24px}
  .footer-actions{display:grid;grid-template-columns:1fr 1.3fr;gap:12px;margin-top:14px}
  .success{text-align:center;padding:20px 0}
  .success .big{font-size:74px}
  .linkbox{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;font-size:12px;word-break:break-all;color:#6c5a50}
  .share-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}
  .share{background:#fff;border:1px solid var(--line);border-radius:20px;padding:13px;text-align:center}
  .share b{font-size:27px;display:block}
  .animal-stage{
    height:240px;
    border-radius:30px;
    background:linear-gradient(180deg,#eddcff,#fff7fb);
    display:grid;
    place-items:center;
    text-align:center;
    border:1px solid #ead7ff;
    box-shadow:var(--shadow);
    margin:14px 0
  }
  .animal-stage .box{font-size:94px;animation:bob 1.2s ease-in-out infinite}
  .animal-stage .result-emoji{font-size:58px}
  @keyframes bob{50%{transform:translateY(-8px)}}
  .result-list{display:grid;gap:9px}
  .result-item{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;display:grid;grid-template-columns:34px 1fr;gap:8px;align-items:center}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .stat{background:white;border:1px solid var(--line);border-radius:16px;text-align:center;padding:12px}
  .stat b{display:block;font-size:22px}
  .record{display:grid;grid-template-columns:42px 1fr auto;gap:8px;align-items:center}
  .empty{color:var(--muted);text-align:center;padding:26px}
  .danger{background:#fff2f2;color:#d64f4f;border:1px solid #ffd0d0}
  .tag{display:inline-block;margin:3px 4px 3px 0;background:#fff0f5;border:1px solid #ffd2e2;border-radius:999px;padding:5px 8px;font-size:12px}
  .group-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .group-col{background:#fff;border:1px solid var(--line);border-radius:18px;padding:10px;text-align:center}
  .group-col h4{margin:4px 0 10px}
  .member{padding:7px 0;border-top:1px dashed #f0d8ca;font-size:13px}
  .toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:#4b3b32;color:white;padding:10px 14px;border-radius:999px;font-size:13px;opacity:0;transition:.25s;z-index:9}
  .toast.show{opacity:1}
  .hide{display:none!important}
</style>
</head>
<body>
<div class="app">
  <div id="home" class="page active"></div>
  <div id="type" class="page"></div>
  <div id="create" class="page"></div>
  <div id="join" class="page"></div>
  <div id="drawing" class="page"></div>
  <div id="result" class="page"></div>
  <div id="manage" class="page"></div>
</div>

<div class="nav">
  <button data-go="home" class="active"><b>🏠</b>首页</button>
  <button data-go="joined"><b>🎟️</b>参与</button>
  <button data-go="type"><b>➕</b>创建</button>
  <button data-go="manageList"><b>💬</b>清单</button>
  <button data-go="me"><b>👤</b>我的</button>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);

const uid = localStorage.drawHouseUid || (localStorage.drawHouseUid = 'u_' + Math.random().toString(36).slice(2,8));

let currentUser = JSON.parse(localStorage.drawHouseUser || 'null') || {
  id: uid,
  displayName: 'Kim',
  avatar: '👧🏻'
};

localStorage.drawHouseUser = JSON.stringify(currentUser);

let data = JSON.parse(localStorage.drawHouseData || 'null');

if(!data){
  data = {
    activities: {},
    participations: {}
  };
  seed();
  save();
}

let createDraft = {};
let step = 1;
let activeActivityId = null;
let pendingResult = null;

function save(){
  localStorage.drawHouseData = JSON.stringify(data);
}

function id(){
  return 'a_' + Math.random().toString(36).slice(2,8);
}

function toast(t){
  const el = $('#toast');
  el.textContent = t;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

function page(name){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const p = $('#' + name);
  if(p) p.classList.add('active');

  document.querySelectorAll('.nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.go === name);
  });

  window.scrollTo(0,0);
}

function seed(){
  const a1 = id();
  const a2 = id();
  const a3 = id();

  data.activities[a1] = {
    id: a1,
    title: '今日小动物幸运签',
    description: '快去分享给大家吧～',
    type: 'random_sign',
    creatorId: uid,
    creatorName: 'Kim',
    status: 'open',
    theme: 'cute_animal',
    accessMode: 'password',
    password: 'HAPPY2024',
    maxDrawsPerUser: 1,
    allowRedraw: false,
    allowDuplicate: true,
    participantCanViewHistory: true,
    publicResults: false,
    createdAt: Date.now() - 86400000,
    config: {
      drawCount: 1,
      resultTemplate: '你抽到了：{{sign}}',
      items: [
        { text:'大吉', description:'今天适合大胆一点', icon:'🐯' },
        { text:'中吉', description:'慢慢来会更稳', icon:'🐰' },
        { text:'奶茶签', description:'奖励自己一杯', icon:'🧋' }
      ]
    },
    records: []
  };

  data.activities[a2] = {
    id: a2,
    title: '周末活动分组',
    description: '随机分成3组',
    type: 'random_group',
    creatorId: uid,
    creatorName: 'Kim',
    status: 'open',
    accessMode: 'public',
    maxDrawsPerUser: 1,
    allowRedraw: true,
    createdAt: Date.now() - 3600000,
    config: {
      participants: ['Kim','Amy','Jason','Lily','Tom','Nina','Evan','Zoey','Leo','Mia','Hana','Ryan'],
      groupMode: 'equal_groups',
      groupCount: 3,
      groupSizes: [],
      allowRegroup: true
    },
    records: []
  };

  data.activities[a3] = {
    id: a3,
    title: 'Amy 的幸运签',
    description: '我抽到了：大吉',
    type: 'random_sign',
    creatorId: 'u_amy',
    creatorName: 'Amy',
    status: 'open',
    accessMode: 'public',
    maxDrawsPerUser: 1,
    allowRedraw: false,
    createdAt: Date.now() - 7200000,
    config: {
      drawCount: 1,
      resultTemplate: '你抽到了：{{sign}}',
      items: [
        { text:'大吉', description:'好事发生', icon:'⭐' }
      ]
    },
    records: [
      {
        participantUserId: uid,
        participantName: 'Kim',
        results: [
          { displayText:'大吉', icon:'⭐' }
        ],
        createdAt: Date.now() - 7000000
      }
    ]
  };

  data.participations[a3] = {
    activityId: a3,
    activityTitle: 'Amy 的幸运签',
    creatorId: 'u_amy',
    creatorName: 'Amy',
    type: 'random_sign',
    lastDrawAt: Date.now()
