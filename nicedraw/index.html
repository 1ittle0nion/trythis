<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>抽签屋 · 我的抽签空间</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Baloo+2:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FBF4E9; --bg2:#FFF9F0; --card:#FFFFFF;
  --ink:#6E5949; --ink-soft:#A99381; --ink-faint:#C9B7A6;
  --pink:#FF8DA1; --pink-deep:#F4738C; --pink-soft:#FFE2E8;
  --yellow:#FFD888; --yellow-soft:#FFF2CF;
  --mint:#8FD9B6; --mint-soft:#E0F5EB;
  --lav:#C3AEEA; --lav-soft:#EFE7FB;
  --peach:#FFC39B; --peach-soft:#FFEEE0;
  --line:#F1E6D6; --line2:#EADCCA;
  --shadow:0 10px 30px -12px rgba(150,110,80,.28);
  --shadow-sm:0 4px 14px -6px rgba(150,110,80,.25);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 12% 8%, #FFEFD9 0, transparent 38%),
    radial-gradient(circle at 88% 14%, #FCE3EC 0, transparent 36%),
    radial-gradient(circle at 50% 100%, #E6F5EC 0, transparent 50%),
    var(--bg);
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; padding:18px;
}
.disp{font-family:"ZCOOL KuaiLe","PingFang SC",cursive}
.baloo{font-family:"Baloo 2",sans-serif}

/* phone frame */
#app{
  width:100%; max-width:412px; height:min(880px,94vh);
  background:var(--bg2); border-radius:38px; overflow:hidden;
  position:relative; box-shadow:0 30px 70px -20px rgba(120,80,50,.4), 0 0 0 9px #fff, 0 0 0 11px #f0e3d2;
  display:flex; flex-direction:column;
}
.screen{position:absolute; inset:0; display:flex; flex-direction:column; opacity:0; pointer-events:none;
  transition:opacity .28s ease; overflow:hidden}
.screen.on{opacity:1; pointer-events:auto; z-index:2}
.scroll{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 18px 26px}
.scroll::-webkit-scrollbar{width:0}

/* top bar */
.topbar{display:flex; align-items:center; gap:10px; padding:16px 18px 8px; flex-shrink:0}
.iconbtn{width:38px;height:38px;border-radius:14px;border:none;background:#fff;box-shadow:var(--shadow-sm);
  display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--ink);flex-shrink:0}
.iconbtn:active{transform:scale(.92)}
.topbar h2{flex:1;font-size:18px;text-align:center;font-weight:700}
.topbar .spacer{width:38px;flex-shrink:0}

/* generic */
.muted{color:var(--ink-soft)}
.card{background:var(--card);border-radius:22px;box-shadow:var(--shadow);padding:16px}
.row{display:flex;align-items:center;gap:12px}
.btn{border:none;border-radius:18px;font-weight:700;cursor:pointer;font-size:16px;
  font-family:inherit;transition:transform .12s, box-shadow .2s}
.btn:active{transform:translateY(2px) scale(.99)}
.btn-primary{background:linear-gradient(135deg,#FF9CAD,#F4738C);color:#fff;padding:15px;width:100%;
  box-shadow:0 10px 22px -8px rgba(244,115,140,.7)}
.btn-ghost{background:#fff;color:var(--ink);padding:15px;width:100%;border:2px solid var(--line2)}
.btn-mint{background:linear-gradient(135deg,#A6E6C8,#7FCFA8);color:#fff;padding:13px;
  box-shadow:0 8px 18px -8px rgba(127,207,168,.7)}
.btnrow{display:flex;gap:12px}
.btnrow .btn{flex:1}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:4px 11px;border-radius:999px}

/* HOME */
.home-hero{margin:4px 18px 0;border-radius:26px;padding:20px 18px 60px;position:relative;overflow:hidden;
  background:linear-gradient(160deg,#FFF3D6 0%,#FFE6EC 55%,#E8F6EE 100%)}
.home-hero .sky{position:absolute;inset:0;pointer-events:none}
.home-hero .star{position:absolute;font-size:14px;opacity:.8;animation:tw 2.6s ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.35;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}
.home-hero h1{position:relative;font-size:30px;line-height:1.2;margin-bottom:4px}
.home-hero p{position:relative;font-size:13px;color:#9b7e6a}
.scene{position:absolute;left:0;right:0;bottom:6px;display:flex;align-items:flex-end;justify-content:center;gap:2px;font-size:34px}
.scene .house{font-size:40px}
.scene .b{animation:bob 3s ease-in-out infinite}
.scene .b:nth-child(2){animation-delay:.4s}.scene .b:nth-child(4){animation-delay:.8s}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.create-cta{margin:-40px 18px 0;position:relative;z-index:3}
.create-cta button{display:flex;align-items:center;justify-content:center;gap:8px;font-size:17px}

.sec-head{display:flex;align-items:center;justify-content:space-between;margin:22px 4px 12px}
.sec-head h3{font-size:16px;font-weight:800}
.sec-head .more{font-size:12px;color:var(--ink-soft);cursor:pointer}

.act{display:flex;align-items:center;gap:13px;background:#fff;border-radius:20px;padding:13px 14px;margin-bottom:11px;
  box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .12s;border:1px solid #fbeede}
.act:active{transform:scale(.985)}
.act .ava{width:46px;height:46px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.act .mid{flex:1;min-width:0}
.act .mid .t{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act .mid .s{font-size:12px;color:var(--ink-soft);margin-top:2px}
.act .arr{color:var(--ink-faint);font-size:20px}
.empty{text-align:center;color:var(--ink-soft);font-size:13px;padding:18px;background:#fff;border-radius:18px;border:1.5px dashed var(--line2)}

/* bottom nav */
.tabbar{flex-shrink:0;display:flex;background:#fff;border-top:1px solid var(--line);padding:8px 6px 16px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--ink-faint);
  cursor:pointer;background:none;border:none;font-family:inherit}
.tab .ic{font-size:20px}
.tab.on{color:var(--pink-deep);font-weight:700}

/* type cards */
.typecard{display:flex;align-items:center;gap:16px;background:#fff;border-radius:24px;padding:18px;margin-bottom:14px;
  box-shadow:var(--shadow-sm);cursor:pointer;border:2px solid transparent;transition:transform .14s,border-color .2s}
.typecard:active{transform:scale(.98)}
.typecard.sel{border-color:var(--pink)}
.typecard .ic{width:62px;height:62px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
.typecard h4{font-size:19px;margin-bottom:3px}
.typecard .d{font-size:12px;color:var(--ink-soft);line-height:1.5}

/* steps */
.stepper{display:flex;align-items:center;justify-content:center;gap:0;padding:6px 0 14px;flex-shrink:0}
.stepper .st{display:flex;flex-direction:column;align-items:center;gap:4px;position:relative}
.stepper .dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:14px;background:#F0E6D8;color:var(--ink-faint);font-weight:700;transition:.25s}
.stepper .st.done .dot{background:var(--mint);color:#fff}
.stepper .st.cur .dot{background:linear-gradient(135deg,#C3AEEA,#A98FE0);color:#fff;box-shadow:0 6px 14px -5px rgba(169,143,224,.8)}
.stepper .lbl{font-size:10px;color:var(--ink-soft)}
.stepper .st.cur .lbl{color:var(--lav);font-weight:700}
.stepper .bar{width:24px;height:3px;background:#F0E6D8;border-radius:2px;margin:0 2px 16px}
.stepper .bar.done{background:var(--mint)}

.form-title{font-size:21px;text-align:center;margin:2px 0 16px;font-weight:700}
.fgroup{background:#fff;border-radius:20px;padding:15px 16px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.fgroup .gt{font-size:13px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.fgroup .gt .n{width:20px;height:20px;border-radius:7px;background:var(--lav-soft);color:var(--lav);font-size:11px;
  display:flex;align-items:center;justify-content:center;font-weight:800}
.field{margin-bottom:13px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12.5px;color:var(--ink);margin-bottom:6px;font-weight:600}
.field .hint{font-size:11px;color:var(--ink-faint);font-weight:400}
.inp{width:100%;border:1.5px solid var(--line2);border-radius:13px;padding:11px 13px;font-size:14px;
  font-family:inherit;color:var(--ink);background:#FFFDF9;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--pink)}
textarea.inp{resize:none;line-height:1.6}
.inp::placeholder{color:var(--ink-faint)}
.two{display:flex;gap:10px}.two>*{flex:1}

/* segmented toggle */
.seg{display:flex;background:#F6EFE3;border-radius:13px;padding:3px;gap:3px}
.seg button{flex:1;border:none;background:none;padding:9px;border-radius:10px;font-size:13px;font-weight:700;
  color:var(--ink-soft);cursor:pointer;font-family:inherit;transition:.18s}
.seg button.on{background:#fff;color:var(--pink-deep);box-shadow:var(--shadow-sm)}
.seg.mintsel button.on{color:#5BB98C}

/* switch list */
.swrow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
.swrow:last-child{border-bottom:none}
.swrow .l{font-size:13.5px}
.swt{width:46px;height:27px;border-radius:999px;background:#E4D7C5;position:relative;cursor:pointer;flex-shrink:0;transition:.22s}
.swt::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;
  box-shadow:0 2px 5px rgba(0,0,0,.18);transition:.22s}
.swt.on{background:var(--mint)}
.swt.on::after{transform:translateX(19px)}

/* item rows (sign pool / targets / events) */
.itemrow{display:flex;align-items:center;gap:8px;background:#FFFDF9;border:1.5px solid var(--line);
  border-radius:13px;padding:7px 10px;margin-bottom:9px}
.itemrow .grip{font-size:18px}
.itemrow input{flex:1;border:none;background:none;outline:none;font-family:inherit;font-size:14px;color:var(--ink)}
.itemrow input::placeholder{color:var(--ink-faint)}
.itemrow .del{border:none;background:none;color:var(--ink-faint);font-size:18px;cursor:pointer;padding:2px 4px}
.itemrow .del:active{color:var(--pink-deep)}
.additem{width:100%;border:1.5px dashed var(--pink);background:var(--pink-soft);color:var(--pink-deep);
  border-radius:13px;padding:11px;font-weight:700;cursor:pointer;font-family:inherit;font-size:14px}
.additem:active{transform:scale(.99)}

/* radio access */
.optcard{display:flex;gap:12px;background:#fff;border:2px solid var(--line);border-radius:18px;padding:14px;
  margin-bottom:12px;cursor:pointer;transition:.18s}
.optcard.sel{border-color:var(--mint);background:var(--mint-soft)}
.optcard .rd{width:22px;height:22px;border-radius:50%;border:2px solid var(--line2);flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center}
.optcard.sel .rd{border-color:var(--mint)}
.optcard.sel .rd::after{content:"";width:11px;height:11px;border-radius:50%;background:var(--mint)}
.optcard .ot{font-weight:700;font-size:14.5px}
.optcard .od{font-size:11.5px;color:var(--ink-soft);margin-top:3px;line-height:1.5}
.optcard .extra{margin-top:10px}

.foot{flex-shrink:0;padding:10px 18px calc(10px + env(safe-area-inset-bottom));background:#fff;border-top:1px solid var(--line);
  display:flex;gap:11px}
.foot .btn{flex:1}.foot .btn-ghost{flex:.7}

/* publish success */
.success{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 26px;text-align:center;
  background:linear-gradient(180deg,#FFF6E4,#FFF9F0)}
.bunting{font-size:22px;letter-spacing:4px;margin-bottom:8px}
.success .pet{font-size:74px;animation:pop .6s cubic-bezier(.2,1.4,.4,1)}
@keyframes pop{0%{transform:scale(0) rotate(-20deg)}100%{transform:scale(1) rotate(0)}}
.success h2{font-size:26px;margin:10px 0 6px}
.success .sub{font-size:13px;color:var(--ink-soft);margin-bottom:22px}
.linkbox{width:100%;background:#fff;border-radius:18px;padding:14px;box-shadow:var(--shadow-sm);margin-bottom:18px}
.linkbox .lt{font-size:12px;color:var(--ink-soft);text-align:left;margin-bottom:8px;font-weight:700}
.linkbox .lr{display:flex;gap:8px;align-items:center}
.linkbox .url{flex:1;background:#FBF4E9;border-radius:11px;padding:10px;font-size:12px;color:var(--pink-deep);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:"Baloo 2",monospace}
.linkbox .copy{background:var(--pink);color:#fff;border:none;border-radius:11px;padding:10px 13px;font-weight:700;
  font-size:12px;cursor:pointer;flex-shrink:0;font-family:inherit}
.threeact{display:flex;width:100%;gap:10px;margin-bottom:8px}
.threeact button{flex:1;background:#fff;border:none;border-radius:18px;padding:14px 6px;box-shadow:var(--shadow-sm);
  cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:6px}
.threeact .c{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px}
.threeact .lab{font-size:12px;color:var(--ink);font-weight:700}

/* participate */
.partbg{flex:1;display:flex;flex-direction:column;background:linear-gradient(175deg,#EDE4FB 0%,#F6EFFF 45%,#FFF1F5 100%)}
.part-hero{text-align:center;padding:26px 24px 6px}
.part-hero .star{position:absolute;font-size:13px;color:#fff;opacity:.9}
.part-hero h1{font-size:26px;position:relative}
.part-hero .by{font-size:13px;color:#8a7aa8;margin-top:4px}
.part-pet{font-size:62px;text-align:center;margin:6px 0 2px;animation:bob 3s ease-in-out infinite}
.part-panel{margin:8px 22px 0;background:#fff;border-radius:24px;padding:20px 18px;box-shadow:var(--shadow)}
.part-panel h3{font-size:14px;margin-bottom:14px;font-weight:800}
.part-rules{text-align:center;font-size:12px;color:#9683b3;margin-top:14px;cursor:pointer}

/* drawing */
.drawbg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(180deg,#EFE5FC,#FBEFF6);text-align:center;padding:30px}
.drawbg h2{font-size:24px;color:var(--lav);margin-bottom:30px;animation:fade 1.6s ease-in-out infinite}
@keyframes fade{0%,100%{opacity:.6}50%{opacity:1}}
.box{font-size:96px;animation:shake .5s ease-in-out infinite}
@keyframes shake{0%,100%{transform:rotate(-6deg) translateY(0)}25%{transform:rotate(6deg) translateY(-8px)}
  50%{transform:rotate(-4deg) translateY(0)}75%{transform:rotate(5deg) translateY(-6px)}}
.sparkle{position:absolute;font-size:22px;animation:fly 1.2s ease-in-out infinite}
.drawbg .tip{margin-top:30px;color:#9683b3;font-size:13px}
@keyframes fly{0%{transform:translateY(0) scale(.6);opacity:0}50%{opacity:1}100%{transform:translateY(-40px) scale(1);opacity:0}}

/* result */
.resbg{flex:1;display:flex;flex-direction:column;background:linear-gradient(180deg,#F3ECFC,#FFF6F8);overflow:hidden}
.res-scroll{flex:1;overflow-y:auto;padding:18px 20px 14px;text-align:center}
.res-scroll::-webkit-scrollbar{width:0}
.res-scroll h2{font-size:23px;margin:6px 0 18px}
.bignum{font-family:"Baloo 2";font-size:74px;color:var(--pink-deep);line-height:1;margin:10px 0}
.numgrid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:16px 0}
.numchip{min-width:64px;height:64px;border-radius:20px;background:#fff;box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;font-family:"Baloo 2";font-size:30px;color:var(--pink-deep);
  padding:0 10px;animation:pop .5s cubic-bezier(.2,1.4,.4,1) backwards}
.signbig{background:#fff;border-radius:26px;padding:26px 20px;box-shadow:var(--shadow);margin:10px 0;animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
.signbig .ic{font-size:56px}
.signbig .tx{font-size:30px;font-weight:800;margin:8px 0 6px;color:var(--pink-deep)}
.signbig .ds{font-size:13.5px;color:var(--ink-soft)}
.comborow{display:flex;align-items:center;gap:11px;background:#fff;border-radius:17px;padding:13px 14px;margin-bottom:10px;
  box-shadow:var(--shadow-sm);text-align:left;animation:slidein .4s ease backwards}
@keyframes slidein{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
.comborow .ci{font-size:22px;flex-shrink:0}
.comborow .ct{font-size:13.5px;line-height:1.5}
.comborow .ct b{color:var(--pink-deep)}
.groupwrap{display:flex;gap:12px;overflow-x:auto;padding:6px 2px 12px;scroll-snap-type:x mandatory}
.groupwrap::-webkit-scrollbar{height:0}
.groupcard{min-width:150px;background:#fff;border-radius:20px;box-shadow:var(--shadow);padding:14px;flex-shrink:0;scroll-snap-align:center;
  animation:pop .5s cubic-bezier(.2,1.4,.4,1) backwards}
.groupcard .gh{font-weight:800;font-size:15px;text-align:center;padding:7px;border-radius:12px;margin-bottom:11px}
.groupcard .mem{display:flex;align-items:center;gap:8px;font-size:13.5px;padding:5px 2px}
.res-foot{flex-shrink:0;padding:12px 20px calc(14px + env(safe-area-inset-bottom));display:flex;gap:11px}
.res-foot .btn{flex:1}

/* manage */
.mg-head{background:#fff;border-radius:22px;padding:16px;box-shadow:var(--shadow-sm);margin-bottom:14px}
.mg-head .tt{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mg-head .tt h3{font-size:18px}
.mg-head .tt .ed{font-size:12px;color:var(--pink-deep);cursor:pointer;font-weight:700}
.stats{display:flex;gap:10px}
.stat{flex:1;background:#FBF4E9;border-radius:15px;padding:11px;text-align:center}
.stat .v{font-family:"Baloo 2";font-size:24px;color:var(--ink)}
.stat .k{font-size:11px;color:var(--ink-soft);margin-top:2px}
.mtabs{display:flex;background:#F6EFE3;border-radius:13px;padding:3px;margin-bottom:14px}
.mtabs button{flex:1;border:none;background:none;padding:9px;border-radius:10px;font-weight:700;font-size:13px;
  color:var(--ink-soft);cursor:pointer;font-family:inherit}
.mtabs button.on{background:#fff;color:var(--pink-deep);box-shadow:var(--shadow-sm)}
.rec{display:flex;gap:11px;background:#fff;border-radius:16px;padding:12px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
.rec .ava{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.rec .info{flex:1;min-width:0}
.rec .info .nm{font-weight:700;font-size:14px;display:flex;justify-content:space-between}
.rec .info .nm .tm{font-size:11px;color:var(--ink-faint);font-weight:400}
.rec .info .rs{font-size:12px;color:var(--ink-soft);margin-top:3px;line-height:1.4}

/* toast */
#toast{position:absolute;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);
  background:rgba(70,55,45,.92);color:#fff;padding:11px 20px;border-radius:999px;font-size:13px;font-weight:600;
  opacity:0;transition:.3s;z-index:50;pointer-events:none;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* confetti */
.confetti{position:absolute;top:-10px;font-size:16px;animation:drop linear forwards;z-index:40;pointer-events:none}
@keyframes drop{to{transform:translateY(900px) rotate(540deg);opacity:.2}}

.fadein{animation:fi .4s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tag-num{background:var(--lav-soft);color:var(--lav)}
.tag-sign{background:var(--peach-soft);color:#E08A4F}
.tag-group{background:var(--mint-soft);color:#5BB98C}
.tag-combo{background:var(--pink-soft);color:var(--pink-deep)}
</style>
</head>
<body>
<div id="app">
  <!-- screens injected here -->
  <div id="toast"></div>
</div>

<script>
/* ============ DATA LAYER ============ */
const ICONS_ANIMAL = ["🐰","🐱","🐶","🐻","🦊","🐹","🐯","🐼","🐨","🦁","🐮","🐷"];
const PALETTE = ["#FFE2E8","#FFF2CF","#E0F5EB","#EFE7FB","#FFEEE0"];
const TYPE_META = {
  random_number:{name:"随机数字",icon:"🔢",bg:"var(--lav-soft)",tag:"tag-num",desc:"抽编号、座位号、顺序"},
  random_sign:{name:"随机抽签",icon:"🎟️",bg:"var(--peach-soft)",tag:"tag-sign",desc:"抽幸运签、任务签、盲盒"},

let toastTimer;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('on'),1700);
}
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function timeStr(t){ const d=new Date(t); const hh=String(d.getHours()).padStart(2,'0'); const mm=String(d.getMinutes()).padStart(2,'0');
  const today=new Date(); const same=d.toDateString()===today.toDateString();
  return (same?"今天":`${d.getMonth()+1}/${d.getDate()}`)+` ${hh}:${mm}`; }
function randPick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

const STEP_LABELS=["类型","内容","规则","权限","发布"];
function stepperHtml(cur){
  let h=`<div class="stepper">`;
  for(let i=0;i<5;i++){
    const st=i+1;
    const cls = st<cur?"done":(st===cur?"cur":"");
    const icon = st<cur?"✓":(["🏷️","📝","⚙️","🔒","🚀"][i]);
    h+=`<div class="st ${cls}"><div class="dot">${st<cur?"✓":icon}</div><div class="lbl">${STEP_LABELS[i]}</div></div>`;
    if(i<4) h+=`<div class="bar ${st<cur?"done":""}"></div>`;
  }
  return h+`</div>`;
}

function renderCreateFlow(){
  const m=TYPE_META[draft.type];
  const body = {1:stepType,2:stepContent,3:stepRules,4:stepAccess,5:stepPublish}[draft.step]();
  const isLast = draft.step===5;
  showScreen(`
    <div class="topbar"><button class="iconbtn" onclick="${draft.step>1?'prevStep()':'renderCreateType()'}">‹</button>

      ${body}
    </div>

      ${draft.step>1?'<button class="btn btn-ghost" onclick="prevStep()">上一步</button>':''}
      <button class="btn btn-primary" onclick="${isLast?'publishDraft()':'nextStep()'}">${isLast?'🚀 发布活动':'下一步'}</button>
    </div>
  `,{onMount:bindFlow});
}
function bindFlow(root){
  // attach inputs already use inline oninput; nothing extra needed mostly
}
function prevStep(){ draft.step--; renderCreateFlow(); }
function nextStep(){
  if(!validateStep()) return;
  draft.step++; renderCreateFlow();
}
function validateStep(){
  if(draft.step===2){
    if(!draft.title.trim()){ toast("先给活动起个名字吧～"); return false; }
    const c=draft.config;
    if(draft.type==="random_sign" && c.items.filter(i=>i.text.trim()).length<1){ toast("至少添加一个签"); return false; }
    if(draft.type==="combination" && (c.targets.filter(t=>t.trim()).length<1 || c.events.filter(e=>e.trim()).length<1)){ toast("对象池和事件池都要有内容"); return false; }
    if(draft.type==="random_group" && c.participants.filter(p=>p.trim()).length<2){ toast("名单至少要 2 个人"); return false; }
    if(draft.type==="random_number" && c.minNumber>=c.maxNumber){ toast("最大数字要大于最小数字"); return false; }
  }
  if(draft.step===4 && draft.accessMode==="activity_password" && !draft.accessPassword.trim()){ toast("请设置活动口令"); return false; }
  return true;
}

function stepRules(){

/* ============ DRAW LOGIC ============ */
function computeDraw(act){
  const c=act.config; const name=session?session.name.trim():ME;
  if(act.type==="random_number"){
    const pool=[]; for(let n=c.minNumber;n<=c.maxNumber;n++) pool.push(n);
    let picks=[];
    const used=act._numUsed||[];
    let avail=c.removeAfterDraw? pool.filter(n=>!used.includes(n)) : pool.slice();
    for(let i=0;i<c.drawCount;i++){
      if(avail.length===0) break;
      const idx=Math.floor(Math.random()*avail.length); const n=avail[idx];
      picks.push(n);
      if(!c.allowDuplicate) avail.splice(idx,1);
    }
    if(c.removeAfterDraw){ act._numUsed=[...used,...picks]; }
    const fmt=n=> c.padZero? String(n).padStart(String(c.maxNumber).length,'0') : String(n);
    return {kind:"number", name, numbers:picks.map(fmt),
      display: c.template.replace("{{number}}", picks.map(fmt).join("、"))};
  }
  if(act.type==="random_sign"){
    let items=act.config.items.slice();
    if(c.removeAfterDraw && act._signUsed){ items=items.filter(it=>!act._signUsed.includes(it.text)); }
    let picks=[];
    for(let i=0;i<c.drawCount;i++){
      if(items.length===0) break;
      const idx=Math.floor(Math.random()*items.length); picks.push(items[idx]);
      if(c.removeAfterDraw||c.drawCount>1) items.splice(idx,1);
    }
    if(c.removeAfterDraw){ act._signUsed=[...(act._signUsed||[]),...picks.map(p=>p.text)]; }
    return {kind:"sign", name, signs:picks,
      display: c.template.replace("{{sign}}", picks.map(p=>p.text).join("、"))};
  }
  if(act.type==="combination"){
    const subject = c.subjectSource==="current_participant_name"? name : name;
    let targets=shuffle(c.targets);
    let results=[];
    const usedTargets=[]; 
    for(const t of targets){
      if(!c.allowRepeatTarget && usedTargets.includes(t)) continue;
      let ev=shuffle(c.events);
      const usedEv=[];
      for(let k=0;k<c.eventsPerTarget;k++){
        let e=randPick(c.events);
        if(!c.allowRepeatEvent){
          const left=ev.filter(x=>!usedEv.includes(x));
          if(left.length===0) break;
          e=left[0]; usedEv.push(e);
        }
        const line=c.template.replace("{{subject}}",subject).replace("{{target}}",t).replace("{{event}}",e);
        results.push({subject,target:t,event:e,display:line});
      }
      usedTargets.push(t);
    }
    return {kind:"combo", name, subject, results,
      display: results.map(r=>r.display).join(" / ")};
  }
}
function persistRecord(act,result){
  const rec={name:result.name, icon:randPick(ICONS_ANIMAL),
    text: act.type==="combination"? result.results.map(r=>r.display).join("；") : result.display,
    t:Date.now()};
  // handle redraw overwrite
  if(act.allowRedraw){
    act.records=act.records.filter(r=>r.name!==result.name);
  }
  act.records.unshift(rec);
  saveStore();
}

/* ============ GROUP RESULT ============ */
function computeGroups(act){
  const c=act.config;
  const people=shuffle(c.participants.filter(p=>p.trim()));
  let groups=[];
  if(c.groupMode==="equal_groups"){
    const n=Math.max(2,c.groupCount);
    for(let i=0;i<n;i++) groups.push([]);
    people.forEach((p,i)=> groups[i%n].push(p));
  } else {
    const size=Math.max(1,c.perGroup||3);
    for(let i=0;i<people.length;i+=size) groups.push(people.slice(i,i+size));
  }
  return groups;
}

        <div class="stats">
          <div class="stat"><div class="v">${act.type==='random_group'? act.config.participants.length : new Set(recs.map(r=>r.name)).size}</div><div class="k">参与人数</div></div>
          <div class="stat"><div class="v">${drawCount}</div><div class="k">已抽次数</div></div>
          <div class="stat"><div class="v">${act.maxDraws===99?'∞':(act.type==='random_group'?'—':act.maxDraws)}</div><div class="k">每人次数</div></div>
        </div>
      </div>
      ${act.type==='random_group'? `<button class="btn btn-mint" style="width:100%;margin-bottom:14px" onclick="renderGroupResult(store.activities.find(a=>a.id==='${act.id}'),false)">🎲 执行随机分组</button>`
        : `<button class="btn btn-primary" style="margin-bottom:14px" onclick="openParticipate('${act.id}')">👀 预览参与页 / 试抽</button>`}
      <div class="mtabs">
        <button class="${manageTab==='records'?'on':''}" onclick="setMTab('${act.id}','records')">参与记录</button>
        <button class="${manageTab==='settings'?'on':''}" onclick="setMTab('${act.id}','settings')">活动设置</button>
      </div>
      ${manageTab==='records'? recHtml : settingsHtml}
    </div>
    <div class="foot">
      <button class="btn btn-mint" onclick="exportCSV('${act.id}')">导出记录</button>
      <button class="btn btn-primary" onclick="copyLink('draw.luckyfun.com/${act.id}')">分享活动</button>
    </div>
  `);
}
function setMTab(id,t){ manageTab=t; renderManage(id); }
function toggleStatus(id){ const a=store.activities.find(x=>x.id===id); a.status=a.status==='open'?'closed':'open'; saveStore(); toast(a.status==='open'?'活动已开启':'活动已关闭'); renderManage(id); }
function deleteAct(id){
  if(!confirm("确定删除这个活动吗？此操作不可恢复。")) return;
  store.activities=store.activities.filter(a=>a.id!==id); saveStore(); toast("活动已删除"); renderHome();
}
function exportCSV(id){
  const a=store.activities.find(x=>x.id===id);
  let csv="参与者,结果,时间\n"+a.records.map(r=>`${r.name},"${r.text}",${timeStr(r.t)}`).join("\n");
  try{
    const blob=new Blob(["\ufeff"+csv],{type:"text/csv"});
    const url=URL.createObjectURL(blob); const link=document.createElement('a');
    link.href=url; link.download=`${a.title}_记录.csv`; link.click(); URL.revokeObjectURL(url);
    toast("记录已导出 CSV ✓");
  }catch(e){ toast("导出功能需在浏览器中体验"); }
}

/* ============ INIT ============ */
(async function(){
  await loadStore();
  renderHome();
})();
</script>
</body>
</html>
