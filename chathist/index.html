<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天记录截图生成器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root{
    --bg:linear-gradient(165deg,#ebeafa 0%,#f7eef4 55%,#eef6ee 100%);
    --panel:#ffffff; --panel2:#f5f4fd; --line:#e3e2f5;
    --txt:#3a3458; --txt2:#9b97bb; --accent:#9f9df3; --accent-deep:#6353ac;
    --pink:#ff9bb3; --green:#c9ebca; --radius:14px;
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg); color:var(--txt); line-height:1.5;
    -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  .app{ display:flex; min-height:100vh; }
  /* ---------- 编辑面板 ---------- */
  .editor{
    width:420px; flex-shrink:0; background:var(--panel);
    border-right:1px solid var(--line); padding:22px;
    overflow-y:auto; height:100vh;
  }
  .editor h1{ font-size:19px; font-weight:700; margin-bottom:3px; color:var(--accent-deep); letter-spacing:.01em; }
  .editor .sub{ font-size:12px; color:var(--txt2); margin-bottom:20px; }
  .group{ margin-bottom:18px; }
  .group-title{ font-size:12px; color:var(--txt2); letter-spacing:.04em; margin-bottom:8px; position:relative; padding-left:11px; font-weight:600; }
  .group-title::before{ content:''; position:absolute; left:0; top:3px; width:5px; height:12px; border-radius:3px; background:var(--pink); }
  .seg{ display:flex; background:var(--panel2); border-radius:10px; padding:3px; }
  .seg button{
    flex:1; border:0; background:transparent; color:var(--txt2); padding:8px;
    border-radius:8px; font-size:13px; cursor:pointer; font-weight:500; transition:.15s;
  }
  .seg button.on{ background:var(--accent-deep); color:#fff; }
  .row{ display:flex; gap:8px; margin-bottom:8px; }
  label.fld{ display:block; margin-bottom:8px; }
  label.fld span{ display:block; font-size:12px; color:var(--txt2); margin-bottom:4px; }
  input[type=text], input[type=time]{
    width:100%; background:var(--panel2); border:1px solid var(--line);
    color:var(--txt); padding:9px 11px; border-radius:9px; font-size:14px; font-family:inherit;
  }
  input:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(159,157,243,.2); }
  .avatar-pick{ display:flex; align-items:center; gap:10px; }
  .avatar-prev{
    width:44px; height:44px; border-radius:8px; background:var(--panel2);
    border:1px dashed var(--line); flex-shrink:0; background-size:cover; background-position:center;
    display:flex; align-items:center; justify-content:center; color:var(--txt2); font-size:11px;
  }
  .btn{
    border:0; border-radius:9px; padding:9px 14px; font-size:13px; font-weight:600;
    cursor:pointer; font-family:inherit; transition:.15s;
  }
  .btn-ghost{ background:var(--panel2); color:var(--txt); border:1px solid var(--line); }
  .btn-ghost:hover{ border-color:var(--accent); background:#efeefb; color:var(--accent-deep); }
  .btn-accent{ background:linear-gradient(135deg,#9f9df3,#6353ac); color:#fff; width:100%; padding:14px; font-size:15px; border-radius:12px; box-shadow:0 8px 20px rgba(99,83,172,.28); }
  .btn-accent:hover{ filter:brightness(1.08); }
  .btn-sm{ padding:6px 10px; font-size:12px; }
  .member-card{
    background:var(--panel2); border:1px solid var(--line); border-radius:12px;
    padding:11px; margin-bottom:9px;
  }
  .member-card .top{ display:flex; align-items:center; gap:8px; }
  .member-card input{ flex:1; }
  .msg-edit{
    background:var(--panel2); border:1px solid var(--line); border-radius:12px;
    padding:11px; margin-bottom:9px;
  }
  .msg-edit select{
    background:var(--panel); border:1px solid var(--line); color:var(--txt);
    padding:6px 8px; border-radius:7px; font-size:13px; font-family:inherit;
  }
  .msg-edit .top{ display:flex; gap:8px; align-items:center; margin-bottom:8px; }
  .msg-edit textarea{
    width:100%; background:var(--panel); border:1px solid var(--line); color:var(--txt);
    border-radius:8px; padding:8px; font-size:14px; font-family:inherit; resize:vertical; min-height:38px;
  }
  .msg-edit textarea:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(159,157,243,.2); }
  .icon-btn{
    background:transparent; border:0; color:var(--txt2); cursor:pointer; font-size:16px;
    padding:4px 6px; border-radius:6px;
  }
  .icon-btn:hover{ color:#ff6b8a; background:rgba(255,155,179,.16); }
  .hint{ font-size:11px; color:var(--txt2); margin-top:6px; }
  #addMsgBtn, #addMemberBtn{ background:#fff1f4; border-color:#ffd2dc; color:#e76a89; }
  #addMsgBtn:hover, #addMemberBtn:hover{ background:#ffe5ec; border-color:var(--pink); color:#d84f72; }
  .hidden{ display:none !important; }

  /* ---------- 预览区 ---------- */
  .preview{ flex:1; display:flex; flex-direction:column; align-items:center; padding:30px 20px; overflow-y:auto; height:100vh; }
  .preview-tools{ margin-bottom:18px; display:flex; gap:10px; align-items:center; }
  .phone{
    width:375px; background:#ededed; overflow:hidden;
    box-shadow:0 24px 60px rgba(99,83,172,.22); border-radius:6px;
  }

  /* 状态栏 */
  .statusbar{
    height:44px; display:flex; align-items:center; justify-content:space-between;
    padding:0 18px 0 24px; font-size:15px; font-weight:600; color:#000;
  }
  .statusbar .right{ display:flex; align-items:center; gap:6px; }
  .sb-icons{ display:flex; align-items:center; gap:5px; }
  .battery{ display:flex; align-items:center; gap:2px; }
  .battery .body{ width:22px; height:11px; border:1px solid rgba(0,0,0,.4); border-radius:3px; padding:1px; }
  .battery .body i{ display:block; height:100%; background:#000; border-radius:1px; }
  .battery .cap{ width:1.5px; height:4px; background:rgba(0,0,0,.4); border-radius:0 1px 1px 0; }

  /* 导航栏 */
  .navbar{
    height:44px; display:flex; align-items:center; padding:0 12px; position:relative;
  }
  .navbar .back{ font-size:24px; color:#000; width:30px; }
  .navbar .title{
    position:absolute; left:0; right:0; text-align:center; font-size:17px; font-weight:600;
    color:#000; pointer-events:none;
  }
  .navbar .title small{ display:block; font-size:11px; font-weight:400; color:#888; }
  .navbar .more{ margin-left:auto; font-size:22px; color:#000; letter-spacing:1px; z-index:1; }

  /* 消息区 */
  .chat-body{ padding:14px 12px 18px; min-height:320px; }
  .timestamp{ text-align:center; margin:10px 0; }
  .timestamp span{ font-size:12px; color:#fff; background:rgba(0,0,0,.15); padding:2px 7px; border-radius:4px; }
  .msg{ display:flex; margin-bottom:18px; align-items:flex-start; }
  .msg .av{ width:40px; height:40px; border-radius:5px; flex-shrink:0; background-size:cover; background-position:center; background-color:#ccc; }
  .msg .bubble-wrap{ max-width:62%; margin:0 10px; }
  .msg .name{ font-size:12px; color:#9a9a9a; margin-bottom:3px; }
  .msg .bubble{
    position:relative; padding:9px 13px; border-radius:5px; font-size:16px;
    line-height:1.45; color:#000; word-break:break-word; white-space:pre-wrap;
  }
  .msg.them .bubble{ background:#fff; }
  .msg.them .bubble:after{
    content:''; position:absolute; left:-5px; top:13px; width:0; height:0;
    border:5px solid transparent; border-right-color:#fff; border-left:0;
  }
  .msg.me{ flex-direction:row-reverse; }
  .msg.me .bubble-wrap{ display:flex; flex-direction:column; align-items:flex-end; }
  .msg.me .bubble:after{
    content:''; position:absolute; right:-5px; top:13px; width:0; height:0;
    border:5px solid transparent; border-left-color:#95ec69; border-right:0;
  }

  /* 输入栏 */
  .inputbar{
    height:52px; background:#f7f7f7; border-top:1px solid #dcdcdc;
    display:flex; align-items:center; padding:0 12px; gap:10px;
  }
  .inputbar .ic{ width:26px; height:26px; border:1.8px solid #000; border-radius:50%; position:relative; flex-shrink:0; }
  .inputbar .ic:before{ content:''; position:absolute; left:50%; top:6px; bottom:6px; width:1.8px; background:#000; transform:translateX(-50%); }
  .inputbar .ic:after{ content:''; position:absolute; top:50%; left:6px; right:6px; height:1.8px; background:#000; transform:translateY(-50%); }
  .inputbar .box{ flex:1; height:36px; background:#fff; border-radius:5px; }
  .inputbar .dots{ font-size:22px; color:#000; }

  /* ====== 微信主题 ====== */
  .phone.wechat{ background:#ededed; }
  .phone.wechat .navbar{ background:#ededed; }
  .phone.wechat .chat-body{ background:#ededed; }
  .phone.wechat .msg.me .bubble{ background:#95ec69; }

  /* ====== QQ 主题 ====== */
  .phone.qq{ background:#fff; }
  .phone.qq .statusbar{ color:#000; }
  .phone.qq .navbar{ background:#fff; border-bottom:1px solid #f0f0f0; }
  .phone.qq .chat-body{ background:#f2f4f7; min-height:320px; }
  .phone.qq .msg .av{ border-radius:50%; }
  .phone.qq .msg .bubble{ border-radius:8px; font-size:15.5px; }
  .phone.qq .msg.them .bubble{ background:#fff; }
  .phone.qq .msg.them .bubble:after{ border-right-color:#fff; }
  .phone.qq .msg.me .bubble{ background:#3eedfd; background:linear-gradient(135deg,#2db4ff,#0a86ff); color:#fff; }
  .phone.qq .msg.me .bubble:after{ border-left-color:#0a86ff; }
  .phone.qq .timestamp span{ background:rgba(0,0,0,.12); }
  .phone.qq .inputbar{ background:#fff; }

  /* 红包 / 转账 / 撤回 */
  .redpacket,.transfer{ width:210px; border-radius:8px; padding:12px 14px; color:#fff;
    background:linear-gradient(135deg,#fbab47,#f67d1a); }
  .redpacket{ display:flex; align-items:center; gap:11px; }
  .rp-ico{ width:34px;height:34px;border-radius:7px;background:rgba(255,255,255,.92);
    display:flex;align-items:center;justify-content:center;flex-shrink:0; }
  .rp-ico b{ width:16px;height:16px;border-radius:50%;
    background:linear-gradient(#ffe08a,#f3bf52);border:1.5px solid #eeb53c; }
  .rp-txt{ font-size:14px; line-height:1.35; }
  .rp-txt small{ display:block; font-size:10.5px; opacity:.85; margin-top:5px;
    border-top:1px solid rgba(255,255,255,.28); padding-top:5px; }
  .tr-top{ display:flex; align-items:center; gap:11px; }
  .tr-ico{ width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.92);
    flex-shrink:0;display:flex;align-items:center;justify-content:center;
    color:#f0801a;font-size:17px;font-weight:700; }
  .tr-amt{ font-size:18px;font-weight:600;line-height:1.15; }
  .tr-sub{ font-size:11.5px;opacity:.92;margin-top:1px; }
  .tr-foot{ font-size:11px;opacity:.85;border-top:1px solid rgba(255,255,255,.3);
    margin-top:9px;padding-top:6px; }
  .recall-tip{ text-align:center; margin:14px 0; }
  .recall-tip span{ font-size:12.5px; color:#9a9a9a; }

  @media(max-width:820px){
    .app{ flex-direction:column; }
    .editor{ width:100%; height:auto; border-right:0; border-bottom:1px solid var(--line); }
    .preview{ height:auto; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- ============ 编辑面板 ============ -->
  <div class="editor">
    <h1>聊天记录截图生成器</h1>
    <div class="sub">微信 / QQ · 单聊 / 群聊 · 一键导出图片</div>

    <div class="group">
      <div class="group-title">平台样式</div>
      <div class="seg" id="segPlatform">
        <button data-v="wechat" class="on">微信</button>
        <button data-v="qq">QQ</button>
      </div>
    </div>

    <div class="group">
      <div class="group-title">聊天场景</div>
      <div class="seg" id="segMode">
        <button data-v="single" class="on">单聊</button>
        <button data-v="group">群聊</button>
      </div>
    </div>

    <div class="group">
      <div class="group-title">状态栏</div>
      <div class="row">
        <label class="fld" style="flex:1"><span>时间</span><input type="text" id="sbTime" value="20:08"></label>
        <label class="fld" style="flex:1.4"><span>运营商</span><input type="text" id="sbCarrier" value="中国移动"></label>
        <label class="fld" style="width:80px"><span>电量%</span><input type="text" id="sbBattery" value="86"></label>
      </div>
    </div>

    <div class="group">
      <div class="group-title" id="titleLabel">聊天对象</div>
      <label class="fld"><span id="titleHint">对方昵称(显示在顶部)</span><input type="text" id="chatTitle" value="小明"></label>
    </div>

    <div class="group">
      <div class="group-title">我的头像</div>
      <div class="avatar-pick">
        <div class="avatar-prev" id="myAvatarPrev">点击<br>上传</div>
        <input type="file" id="myAvatarInput" accept="image/*" class="hidden">
        <button class="btn btn-ghost btn-sm" id="myAvatarBtn">选择图片</button>
      </div>
    </div>

    <div class="group">
      <div class="group-title" id="membersTitle">对方</div>
      <div id="membersList"></div>
      <button class="btn btn-ghost btn-sm hidden" id="addMemberBtn">+ 添加群成员</button>
    </div>

    <div class="group">
      <div class="group-title">对话内容</div>
      <div id="msgList"></div>
      <button class="btn btn-ghost btn-sm" id="addMsgBtn">+ 添加一条消息</button>
    </div>

    <button class="btn btn-accent" id="exportBtn">导出截图并下载</button>
    <div class="hint">提示：头像用本地图片即可，导出的是聊天界面区域的高清 PNG。</div>
  </div>

  <!-- ============ 预览区 ============ -->
  <div class="preview">
    <div class="preview-tools">
      <span style="font-size:13px;color:var(--txt2)">实时预览</span>
    </div>
    <div class="phone wechat" id="phone">
      <div class="statusbar">
        <div class="time" id="vTime">20:08</div>
        <div class="right">
          <span class="carrier" id="vCarrier" style="font-size:13px;font-weight:500">中国移动</span>
          <div class="sb-icons">
            <!-- 信号 -->
            <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx="1" fill="#000"/><rect x="4.5" y="5" width="3" height="6" rx="1" fill="#000"/><rect x="9" y="2.5" width="3" height="8.5" rx="1" fill="#000"/><rect x="13.5" y="0" width="3" height="11" rx="1" fill="#000"/></svg>
            <!-- wifi -->
            <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2.5c2.4 0 4.6.9 6.2 2.4l-1.5 1.5C11.5 5.2 9.8 4.5 8 4.5S4.5 5.2 3.3 6.4L1.8 4.9C3.4 3.4 5.6 2.5 8 2.5zm0 3.3c1.4 0 2.7.5 3.7 1.4l-1.5 1.5C9.6 8.2 8.8 7.8 8 7.8s-1.6.4-2.2.9L4.3 7.2C5.3 6.3 6.6 5.8 8 5.8zM8 9c.7 0 1.3.6 1.3 1.3S8.7 11.6 8 11.6 6.7 11 6.7 10.3 7.3 9 8 9z" fill="#000"/></svg>
            <div class="battery">
              <div class="body"><i id="vBattery" style="width:86%"></i></div>
              <div class="cap"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="navbar">
        <span class="back">‹</span>
        <div class="title" id="vTitle">小明<small id="vSubtitle" class="hidden"></small></div>
        <span class="more">···</span>
      </div>
      <div class="chat-body" id="vChatBody"></div>
      <div class="inputbar">
        <div class="ic"></div>
        <div class="box"></div>
        <span class="dots">＋</span>
      </div>
    </div>
  </div>
</div>

<script>
const DEFAULT_AV = "data:image/svg+xml;base64," + btoa('<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><rect width="40" height="40" fill="#c8c8c8"/><circle cx="20" cy="15" r="7" fill="#fff"/><path d="M6 38c0-8 6-12 14-12s14 4 14 12" fill="#fff"/></svg>');

let state = {
  platform:'wechat',
  mode:'single',
  time:'20:08', carrier:'中国移动', battery:'86',
  title:'小明',
  myAvatar:DEFAULT_AV,
  members:[ {id:'m1', name:'小明', avatar:DEFAULT_AV} ],
  messages:[
    {id:'x1', sender:'m1', type:'text', text:'在吗？'},
    {id:'x2', sender:'me', type:'text', text:'在的，怎么了'},
    {id:'x3', sender:'m1', type:'text', text:'晚上一起吃饭吗'},
    {id:'x4', sender:'me', type:'redpacket', text:'请你吃饭！', amount:''},
  ]
};
let uid = 100;
const nid = (p)=> p+(++uid);

// ---------- 文件读取 ----------
function readImage(file, cb){
  const r = new FileReader();
  r.onload = ()=> cb(r.result);
  r.readAsDataURL(file);
}

// ---------- 渲染编辑面板动态部分 ----------
function renderMembers(){
  const wrap = document.getElementById('membersList');
  const title = document.getElementById('membersTitle');
  const addBtn = document.getElementById('addMemberBtn');
  title.textContent = state.mode==='single' ? '对方头像' : '群成员';
  addBtn.classList.toggle('hidden', state.mode==='single');

  wrap.innerHTML = '';
  state.members.forEach((m, i)=>{
    const card = document.createElement('div');
    card.className = 'member-card';
    card.innerHTML = `
      <div class="top">
        <div class="avatar-prev" data-av="${m.id}" style="${m.avatar?`background-image:url(${m.avatar})`:''}">${m.avatar?'':'头像'}</div>
        <input type="text" data-name="${m.id}" value="${esc(m.name)}" placeholder="昵称">
        ${state.mode==='group' && state.members.length>1 ? `<button class="icon-btn" data-del="${m.id}">✕</button>`:''}
      </div>`;
    wrap.appendChild(card);
  });

  // 绑定
  wrap.querySelectorAll('[data-av]').forEach(el=>{
    el.onclick = ()=>{
      const inp = document.createElement('input');
      inp.type='file'; inp.accept='image/*';
      inp.onchange = e=>{ if(e.target.files[0]) readImage(e.target.files[0], d=>{ getMember(el.dataset.av).avatar=d; renderMembers(); renderPreview(); }); };
      inp.click();
    };
  });
  wrap.querySelectorAll('[data-name]').forEach(el=>{
    el.oninput = ()=>{ getMember(el.dataset.name).name = el.value; renderPreview(); renderMsgList(); };
  });
  wrap.querySelectorAll('[data-del]').forEach(el=>{
    el.onclick = ()=>{
      state.members = state.members.filter(m=>m.id!==el.dataset.del);
      state.messages.forEach(msg=>{ if(msg.sender===el.dataset.del) msg.sender = state.members[0]?.id || 'me'; });
      renderMembers(); renderMsgList(); renderPreview();
    };
  });
}
function getMember(id){ return state.members.find(m=>m.id===id); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderMsgList(){
  const wrap = document.getElementById('msgList');
  wrap.innerHTML = '';
  const types = {text:'文字', redpacket:'红包', transfer:'转账', recall:'撤回'};
  state.messages.forEach(msg=>{
    if(!msg.type) msg.type='text';
    const card = document.createElement('div');
    card.className = 'msg-edit';
    let opts = `<option value="me" ${msg.sender==='me'?'selected':''}>我</option>`;
    state.members.forEach(m=> opts += `<option value="${m.id}" ${msg.sender===m.id?'selected':''}>${esc(m.name)||'对方'}</option>`);
    let topts = Object.keys(types).map(t=>`<option value="${t}" ${msg.type===t?'selected':''}>${types[t]}</option>`).join('');
    let fields = '';
    if(msg.type==='text')
      fields = `<textarea data-text="${msg.id}" placeholder="输入消息内容">${esc(msg.text)}</textarea>`;
    else if(msg.type==='redpacket')
      fields = `<input type="text" data-text="${msg.id}" placeholder="红包祝福语" value="${esc(msg.text||'')}">`;
    else if(msg.type==='transfer')
      fields = `<div class="row" style="margin:0"><input type="text" data-amt="${msg.id}" placeholder="金额 如 88.00" value="${esc(msg.amount||'')}" style="flex:1"><input type="text" data-text="${msg.id}" placeholder="说明(可选)" value="${esc(msg.text||'')}" style="flex:1.3"></div>`;
    else if(msg.type==='recall')
      fields = `<div class="hint" style="margin-top:0">预览将显示「${esc(recallText(msg))}」</div>`;
    card.innerHTML = `
      <div class="top">
        <select data-sender="${msg.id}">${opts}</select>
        <select data-type="${msg.id}">${topts}</select>
        <button class="icon-btn" data-delmsg="${msg.id}" style="margin-left:auto">✕</button>
      </div>
      ${fields}`;
    wrap.appendChild(card);
  });
  wrap.querySelectorAll('[data-sender]').forEach(el=> el.onchange=()=>{ getMsg(el.dataset.sender).sender=el.value; renderMsgList(); renderPreview(); });
  wrap.querySelectorAll('[data-type]').forEach(el=> el.onchange=()=>{ const m=getMsg(el.dataset.type); m.type=el.value; if(m.type==='redpacket'&&!m.text) m.text='恭喜发财,大吉大利'; renderMsgList(); renderPreview(); });
  wrap.querySelectorAll('[data-text]').forEach(el=> el.oninput=()=>{ getMsg(el.dataset.text).text=el.value; renderPreview(); });
  wrap.querySelectorAll('[data-amt]').forEach(el=> el.oninput=()=>{ getMsg(el.dataset.amt).amount=el.value; renderPreview(); });
  wrap.querySelectorAll('[data-delmsg]').forEach(el=> el.onclick=()=>{ state.messages=state.messages.filter(m=>m.id!==el.dataset.delmsg); renderMsgList(); renderPreview(); });
}
function getMsg(id){ return state.messages.find(m=>m.id===id); }
function recallText(msg){
  if(msg.sender==='me') return '你撤回了一条消息';
  const m = getMember(msg.sender);
  if(state.mode==='group') return '"'+(m?m.name:'')+'"撤回了一条消息';
  return '对方撤回了一条消息';
}

// ---------- 渲染手机预览 ----------
function renderPreview(){
  const phone = document.getElementById('phone');
  phone.className = 'phone ' + state.platform;
  document.getElementById('vTime').textContent = state.time;
  document.getElementById('vCarrier').textContent = state.carrier;
  let bat = parseInt(state.battery)||0; bat=Math.max(0,Math.min(100,bat));
  document.getElementById('vBattery').style.width = bat+'%';

  const titleEl = document.getElementById('vTitle');
  const subEl = document.getElementById('vSubtitle');
  if(state.mode==='group'){
    titleEl.childNodes[0].nodeValue = state.title;
    subEl.classList.remove('hidden');
    subEl.textContent = '('+state.members.length+')';
  } else {
    titleEl.childNodes[0].nodeValue = state.title;
    subEl.classList.add('hidden');
  }

  const body = document.getElementById('vChatBody');
  body.innerHTML = '';
  const plat = state.platform==='wechat'?'微信':'QQ';
  state.messages.forEach((msg)=>{
    if(!msg.type) msg.type='text';
    if(msg.type==='recall'){
      const tip = document.createElement('div');
      tip.className = 'recall-tip';
      tip.innerHTML = `<span>${esc(recallText(msg))}</span>`;
      body.appendChild(tip);
      return;
    }
    const isMe = msg.sender==='me';
    const m = isMe ? null : getMember(msg.sender);
    const av = isMe ? state.myAvatar : (m?m.avatar:DEFAULT_AV);
    const showName = (!isMe && state.mode==='group');
    let content;
    if(msg.type==='redpacket'){
      content = `<div class="redpacket"><div class="rp-ico"><b></b></div><div class="rp-txt">${esc(msg.text||'恭喜发财,大吉大利')}<small>${plat}红包</small></div></div>`;
    } else if(msg.type==='transfer'){
      content = `<div class="transfer"><div class="tr-top"><div class="tr-ico">¥</div><div><div class="tr-amt">¥${esc(msg.amount||'0.00')}</div><div class="tr-sub">${esc(msg.text||'转账')}</div></div></div><div class="tr-foot">${plat}转账</div></div>`;
    } else {
      content = `<div class="bubble">${esc(msg.text)}</div>`;
    }
    const row = document.createElement('div');
    row.className = 'msg ' + (isMe?'me':'them');
    row.innerHTML = `
      <div class="av" style="background-image:url(${av})"></div>
      <div class="bubble-wrap">
        ${showName?`<div class="name">${esc(m?m.name:'')}</div>`:''}
        ${content}
      </div>`;
    body.appendChild(row);
  });
}

// ---------- 事件绑定 ----------
document.getElementById('segPlatform').addEventListener('click', e=>{
  if(e.target.dataset.v){ state.platform=e.target.dataset.v;
    [...e.currentTarget.children].forEach(b=>b.classList.toggle('on', b===e.target));
    renderPreview(); }
});
document.getElementById('segMode').addEventListener('click', e=>{
  if(e.target.dataset.v){ state.mode=e.target.dataset.v;
    [...e.currentTarget.children].forEach(b=>b.classList.toggle('on', b===e.target));
    document.getElementById('titleLabel').textContent = state.mode==='group'?'群聊':'聊天对象';
    document.getElementById('titleHint').textContent = state.mode==='group'?'群名称(显示在顶部)':'对方昵称(显示在顶部)';
    if(state.mode==='group' && state.members.length===1){
      state.members.push({id:nid('m'), name:'小红', avatar:DEFAULT_AV});
      state.title = state.title==='小明'?'家庭群':state.title;
      document.getElementById('chatTitle').value = state.title;
    }
    renderMembers(); renderMsgList(); renderPreview(); }
});
['sbTime','sbCarrier','sbBattery','chatTitle'].forEach(id=>{
  document.getElementById(id).addEventListener('input', e=>{
    if(id==='sbTime') state.time=e.target.value;
    if(id==='sbCarrier') state.carrier=e.target.value;
    if(id==='sbBattery') state.battery=e.target.value;
    if(id==='chatTitle') state.title=e.target.value;
    renderPreview();
  });
});
document.getElementById('myAvatarBtn').onclick = ()=> document.getElementById('myAvatarInput').click();
document.getElementById('myAvatarPrev').onclick = ()=> document.getElementById('myAvatarInput').click();
document.getElementById('myAvatarInput').onchange = e=>{
  if(e.target.files[0]) readImage(e.target.files[0], d=>{
    state.myAvatar=d;
    document.getElementById('myAvatarPrev').style.backgroundImage=`url(${d})`;
    document.getElementById('myAvatarPrev').textContent='';
    renderPreview();
  });
};
document.getElementById('addMemberBtn').onclick = ()=>{
  state.members.push({id:nid('m'), name:'新成员', avatar:DEFAULT_AV});
  renderMembers(); renderMsgList(); renderPreview();
};
document.getElementById('addMsgBtn').onclick = ()=>{
  const lastSender = state.messages.length? (state.messages[state.messages.length-1].sender==='me'? (state.members[0]?.id||'me') :'me') : 'me';
  state.messages.push({id:nid('x'), sender:lastSender, type:'text', text:''});
  renderMsgList(); renderPreview();
};
document.getElementById('exportBtn').onclick = ()=>{
  const btn = document.getElementById('exportBtn');
  const old = btn.textContent; btn.textContent='正在生成…'; btn.disabled=true;
  const node = document.getElementById('phone');
  html2canvas(node, {scale:3, backgroundColor:null, useCORS:true, logging:false}).then(canvas=>{
    const a = document.createElement('a');
    a.download = (state.platform==='wechat'?'微信':'QQ')+'聊天记录_'+Date.now()+'.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    btn.textContent=old; btn.disabled=false;
  }).catch(err=>{ alert('生成失败：'+err.message); btn.textContent=old; btn.disabled=false; });
};

// 初始化
renderMembers();
renderMsgList();
renderPreview();
</script>
</body>
</html>
